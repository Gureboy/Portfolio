[build]
  publish = "."

# Redirect API calls to functions (when/if serverless functions are added)
# [[redirects]]
#   from = "/api/db/*"
#   to = "/.netlify/functions/:splat"
#   status = 200

# CORS headers for all API routes
[[headers]]
  for = "/api/db/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://danielsalini.netlify.app"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PUT, OPTIONS"
